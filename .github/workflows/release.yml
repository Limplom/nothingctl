name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Prepare embedded data
        run: |
          cp debloat.json go/internal/data/debloat.json
          cp modules.json go/internal/data/modules.json

      - name: Build binaries
        run: |
          VERSION="${{ github.ref_name }}"
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          mkdir -p dist

          GOOS=windows GOARCH=amd64 go build -C go -ldflags="${LDFLAGS}" -o ../dist/nothingctl-windows-amd64.exe     ./cmd/nothingctl/
          GOOS=linux   GOARCH=amd64 go build -C go -ldflags="${LDFLAGS}" -o ../dist/nothingctl-linux-amd64          ./cmd/nothingctl/
          GOOS=linux   GOARCH=arm64 go build -C go -ldflags="${LDFLAGS}" -o ../dist/nothingctl-linux-arm64           ./cmd/nothingctl/
          GOOS=darwin  GOARCH=amd64 go build -C go -ldflags="${LDFLAGS}" -o ../dist/nothingctl-darwin-amd64          ./cmd/nothingctl/
          GOOS=darwin  GOARCH=arm64 go build -C go -ldflags="${LDFLAGS}" -o ../dist/nothingctl-darwin-arm64          ./cmd/nothingctl/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "nothingctl ${{ github.ref_name }}"
          body: |
            ## nothingctl ${{ github.ref_name }}

            ### Downloads

            | Platform | Architecture | File |
            |---|---|---|
            | Windows | x86-64 | `nothingctl-windows-amd64.exe` |
            | Linux | x86-64 | `nothingctl-linux-amd64` |
            | Linux | ARM64 | `nothingctl-linux-arm64` |
            | macOS | Intel | `nothingctl-darwin-amd64` |
            | macOS | Apple Silicon | `nothingctl-darwin-arm64` |

            Verify integrity with `checksums.txt` (SHA-256).

            ### Requirements
            - `adb` and `fastboot` in PATH ([platform-tools](https://developer.android.com/tools/releases/platform-tools))
            - `7z` in PATH for firmware extraction ([7-Zip](https://www.7-zip.org/))
          files: dist/*
          generate_release_notes: true
